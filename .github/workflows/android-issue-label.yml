name: Auto label issues

on:
  issues:
    types: [opened, edited]

jobs:
  labelIssue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Label issues
        uses: actions/github-script@v5
        with:
          script: |
            // Vars
            const issueBody = context.payload.issue.body;
            const repoInfo = {
              owner: context.repo.owner,
              repo: context.repo.repo
            };

            // Functions
            function issuesGenLabel(label, color) {
              github.rest.issues.getLabel({
                ...repoInfo,
                name: label,
              }).catch(async () => {
                github.rest.issues.createLabel({
                  ...repoInfo,
                  name: label,
                  color: color,
                }).catch((error) => {
                  console.log(`Failed to create label: ${label}, error: ${error.message}`);
                });
              });
            }

            function issuesAddLabels(labels) {
              github.rest.issues.addLabels({
                ...repoInfo,
                issue_number: context.issue.number,
                labels: labels,
              });
            }

            // Extract LineageOS version vars (for safety checks)
            const losVersionMatch = issueBody.match(/LineageOS version\s*\n*(\d+(?:\.\d+)?)-(\d+)-(UNOFFICIAL)-(\w+)/i);
            const losVersion = losVersionMatch ? Math.floor(parseFloat(losVersionMatch[1])).toString() : null;
            const buildDeviceName = losVersionMatch ? losVersionMatch[4] : null;

            // Extract device label
            const deviceLabelMatch = issueBody.match(/Device\s*(\w+)/i);
            const deviceLabel = deviceLabelMatch ? deviceLabelMatch[1] : null;

            // Generate LineageOS Version label from the version string
            const losLabel = losVersion ? `lineage-${losVersion}` : null;

            // Create labels if they do not exist
            if (deviceLabel && losLabel) {
              await issuesGenLabel(deviceLabel, 'dcaef5');
              await issuesGenLabel(losLabel, '81db8d');
            }

            // Remove all labels from issue
            await github.rest.issues.removeAllLabels({
              ...repoInfo,
              issue_number: context.issue.number,
            }).catch(error => {
              console.log(`Failed to remove labels: ${error.message}`);
            });

            // Validate ticket
            if (!losVersion || deviceLabel !== buildDeviceName) {
              //
              // The issue is invalid !!
              //
              // Mark issue as invalid
              await issuesAddLabels(['invalid']);

              // Send a comment
              await github.rest.issues.createComment({
                ...repoInfo,
                issue_number: context.issue.number,
                body: "The `LineageOS version` or the labels contains invalid information.\n\nPlease edit the ticket report with valid information.",
              });

              // Close the issue
              await github.rest.issues.update({
                ...repoInfo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            } else {
              //
              // The issue is valid !!
              //
              // Assign issue to a specific user
              await github.rest.issues.addAssignees({
                ...repoInfo,
                issue_number: context.issue.number,
                assignees: ['ItsVixano'],
              });

              // Open the issue
              await github.rest.issues.update({
                ...repoInfo,
                issue_number: context.issue.number,
                state: 'open',
              });

              // Add Device & LosVersion labels to issue
              await issuesAddLabels([deviceLabel, losLabel])
            }
