name: Auto label issues

on:
  issues:
    types: [opened, edited]

jobs:
  labelIssue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Label issues
        uses: actions/github-script@v5
        with:
          script: |
            // Vars
            const issueBody = context.payload.issue.body;
            const repoInfo = {
              owner: context.repo.owner,
              repo: context.repo.repo
            };

            // Functions
            function issuesGenLabel(label, color) {
              github.rest.issues.getLabel({
                ...repoInfo,
                name: label,
              }).catch(async () => {
                github.rest.issues.createLabel({
                  ...repoInfo,
                  name: label,
                  color: color,
                }).catch((error) => {
                  console.log(`Failed to create label: ${label}, error: ${error.message}`);
                });
              });
            }

            function issuesAddLabels(labels) {
              github.rest.issues.addLabels({
                ...repoInfo,
                issue_number: context.issue.number,
                labels: labels,
              });
            }

            async function fetchDeviceInfo(deviceName) {
              try {
                const response = await fetch(`https://gitlab.com/itsvixano-dev/infra/wiki.itsvixano.me/-/raw/master/_data/devices/${deviceName}.yml`);
                if (!response.ok) return null;
                const text = await response.text();
                const maintainedMatch = text.match(/is_maintained:\s*False/i);
                const versionMatch = text.match(/current_version:\s*(\d+(?:\.\d+)?)/i);
                return {
                  isMaintained: !maintainedMatch,
                  currentVersion: versionMatch ? versionMatch[1] : null
                };
              } catch (error) {
                console.log(`Failed to fetch device info: ${error.message}`);
                return null;
              }
            }

            // Extract LineageOS version vars (for safety checks)
            const losVersionMatch = issueBody.match(/LineageOS version\s*\n*(\d+(?:\.\d+)?)-(\d+)-(UNOFFICIAL)-(\w+)/i);
            const losVersion = losVersionMatch ? losVersionMatch[1] : null;
            const losMajorVersion = losVersion ? Math.floor(parseFloat(losVersion)).toString() : null;
            const deviceLabel = losVersionMatch ? losVersionMatch[4] : null;

            // Generate LineageOS Version label from the version string
            const losLabel = losMajorVersion ? `lineage-${losMajorVersion}` : null;

            // Create labels if they do not exist
            if (deviceLabel && losLabel) {
              await issuesGenLabel(deviceLabel, 'dcaef5');
              await issuesGenLabel(losLabel, '81db8d');
            }

            // Remove all labels from issue
            await github.rest.issues.removeAllLabels({
              ...repoInfo,
              issue_number: context.issue.number,
            }).catch(error => {
              console.log(`Failed to remove labels: ${error.message}`);
            });

            // Validate ticket
            if (!losVersion || !deviceLabel) {
              //
              // The issue is invalid !!
              //
              // Mark issue as invalid
              await issuesAddLabels(['invalid']);

              // Send a comment
              await github.rest.issues.createComment({
                ...repoInfo,
                issue_number: context.issue.number,
                body: "The `LineageOS version` contains invalid information.\n\nPlease edit the ticket report with valid information.",
              });

              // Close the issue
              await github.rest.issues.update({
                ...repoInfo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            } else {
              // Fetch device info
              const deviceInfo = await fetchDeviceInfo(deviceLabel);

              if (!deviceInfo) {
                //
                // Failed to fetch device info !!
                //
                // Mark issue as invalid
                await issuesAddLabels(['invalid']);

                // Send a comment
                await github.rest.issues.createComment({
                  ...repoInfo,
                  issue_number: context.issue.number,
                  body: `The device \`${deviceLabel}\` was not found.\n\nPlease edit the ticket report with valid information.`,
                });

                // Close the issue
                await github.rest.issues.update({
                  ...repoInfo,
                  issue_number: context.issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
              } else if (!deviceInfo.isMaintained) {
                //
                // Device is no longer maintained !!
                //
                // Mark issue as invalid
                await issuesAddLabels(['invalid']);

                // Send a comment
                await github.rest.issues.createComment({
                  ...repoInfo,
                  issue_number: context.issue.number,
                  body: `The device \`${deviceLabel}\` is no longer maintained and will not receive any further updates.\n\nThis issue will be closed.`,
                });

                // Close the issue
                await github.rest.issues.update({
                  ...repoInfo,
                  issue_number: context.issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
              } else if (deviceInfo.currentVersion && losVersion !== deviceInfo.currentVersion) {
                //
                // Running an invalid version !!
                //
                // Mark issue as invalid
                await issuesAddLabels(['invalid']);

                // Send a comment
                await github.rest.issues.createComment({
                  ...repoInfo,
                  issue_number: context.issue.number,
                  body: `You are not running the latest version of LineageOS. The current version for \`${deviceLabel}\` is [LineageOS ${deviceInfo.currentVersion}](https://files.itsvixano.me/lineage/${deviceLabel}/latest/).\n\n[Please upgrade to the latest version and try again.](https://wiki.itsvixano.me/devices/${deviceLabel}/upgrade/)`,
                });

                // Close the issue
                await github.rest.issues.update({
                  ...repoInfo,
                  issue_number: context.issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
              } else {
                //
                // The issue is valid !!
                //
                // Assign issue to a specific user
                await github.rest.issues.addAssignees({
                  ...repoInfo,
                  issue_number: context.issue.number,
                  assignees: ['ItsVixano'],
                });

                // Open the issue
                await github.rest.issues.update({
                  ...repoInfo,
                  issue_number: context.issue.number,
                  state: 'open',
                });

                // Add Device & LosVersion labels to issue
                await issuesAddLabels([deviceLabel, losLabel])
              }
            }
